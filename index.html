<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>앱 연구소 · App study</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --color-primary:#006DD2; --color-primary-dark:#0056A8; --color-primary-light:#E8F3FF;
    --pastel-blue:#BFD9F2; --pastel-green:#C8EDD9; --pastel-yellow:#FFF3B0; --pastel-pink:#FFD6E0;
    --pastel-blue-dark:#1A5F8A; --pastel-green-dark:#1A6B47; --pastel-yellow-dark:#7A6000; --pastel-pink-dark:#8A2840;
    --ink:#2A4D6E; --ink-soft:#5C7A95; --ink-mute:#9BB1C4;
    --gray-900:#1A1A1A; --gray-700:#404040; --gray-500:#767676; --gray-300:#D8DEE6; --gray-100:#F5F7FA;
    --white:#FFFFFF; --paper:#FFFEFB; --border:#E2E9F0;
    --r-sm:8px; --r-md:12px; --r-lg:18px; --r-pill:999px;
    --sp-xs:4px; --sp-sm:8px; --sp-md:16px; --sp-lg:24px; --sp-xl:40px;
    --shadow-sm:0 4px 12px rgba(80,130,170,.10); --shadow-md:0 10px 26px rgba(80,130,170,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  *{font-family:'Pretendard GOV','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  body{font-size:16px;color:var(--gray-900);background:var(--paper);min-height:100vh;display:flex;flex-direction:column;
    background-image:radial-gradient(circle at 12% 8%, #EAF4FB 0, transparent 38%),radial-gradient(circle at 88% 92%, #FFF8E6 0, transparent 40%);}
  .material-icons-outlined{font-family:'Material Icons Outlined';}

  /* header */
  header.appbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);padding:12px clamp(14px,4vw,40px);}
  .appbar-row{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:12px;}
  .brand-badge{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#89C4E1,#4FA3CF);
    display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:var(--shadow-sm);}
  .brand-badge .material-icons-outlined{font-size:22px;}
  .brand-txt h1{font-size:clamp(16px,4vw,20px);color:var(--ink);line-height:1.25;}
  .brand-txt p{font-size:12px;color:var(--ink-soft);}
  .appbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px;position:relative;flex-shrink:0;}
  .save-state{font-size:12px;color:var(--pastel-green-dark);font-weight:700;background:var(--pastel-green);padding:6px 10px;border-radius:var(--r-pill);white-space:nowrap;}
  .backup-menu{position:absolute;right:0;top:46px;min-width:168px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);
    box-shadow:var(--shadow-md);padding:6px;display:none;z-index:50;}
  .backup-menu.open{display:block;}
  .backup-menu button{width:100%;border:none;background:transparent;color:var(--ink);display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;
    font-weight:800;font-size:14px;cursor:pointer;text-align:left;}
  .backup-menu button:hover,.backup-menu button:focus-visible{background:var(--color-primary-light);outline:none;}
  .backup-menu .material-icons-outlined{font-size:17px;}
  /* stepper */
  .stepper{max-width:960px;margin:12px auto 0;display:flex;gap:6px;}
  .step-dot{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;background:none;border:none;border-radius:10px;padding:0 0 4px;}
  .step-dot .bar{width:100%;height:6px;border-radius:999px;background:var(--gray-300);transition:.25s;}
  .step-dot:hover .bar,.step-dot:focus-visible .bar{box-shadow:0 0 0 3px rgba(0,109,210,.14);}
  .step-dot:focus-visible{outline:3px solid rgba(0,109,210,.28);outline-offset:3px;}
  .step-dot.done .bar{background:var(--pastel-blue);}
  .step-dot.active .bar{background:var(--color-primary);}
  .step-dot span{font-size:11px;color:var(--ink-mute);font-weight:600;}
  .step-dot.active span{color:var(--color-primary);}
  .step-dot.done span{color:var(--pastel-blue-dark);}

  main{flex:1;width:100%;max-width:960px;margin:0 auto;padding:clamp(16px,4vw,32px);}
  .stage{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);
    box-shadow:var(--shadow-md);padding:clamp(18px,4vw,34px);animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
  @keyframes pop{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:var(--r-pill);
    background:var(--pastel-yellow);color:var(--pastel-yellow-dark);font-weight:700;font-size:13px;}
  .step-title{font-size:clamp(21px,5vw,28px);color:var(--ink);font-weight:800;margin:12px 0 6px;line-height:1.3;}
  .step-lead{font-size:15px;color:var(--ink-soft);line-height:1.6;margin-bottom:20px;}

  /* flow banner */
  .flow{display:flex;flex-wrap:wrap;align-items:center;gap:8px;justify-content:center;
    background:var(--color-primary-light);border:1px solid #CFE5FB;border-radius:var(--r-md);padding:14px;margin-bottom:22px;}
  .flow .pill{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-pill);
    font-weight:700;font-size:13px;white-space:nowrap;}
  .flow .pill .material-icons-outlined{font-size:17px;}
  .flow .arrow{color:var(--color-primary);font-weight:800;}
  .p-blue{background:var(--pastel-blue);color:var(--pastel-blue-dark);}
  .p-bluedeep{background:#A6CDEA;color:#15506F;}
  .p-yellow{background:var(--pastel-yellow);color:var(--pastel-yellow-dark);}
  .p-green{background:var(--pastel-green);color:var(--pastel-green-dark);}

  /* teacher prompt box */
  .ask{background:var(--pastel-yellow);border:1px solid #F0DC8C;border-radius:var(--r-md);padding:14px 16px;margin-bottom:18px;}
  .ask .ask-h{display:flex;align-items:center;gap:7px;font-weight:800;color:var(--pastel-yellow-dark);font-size:14px;margin-bottom:8px;}
  .ask ul{list-style:none;display:flex;flex-direction:column;gap:5px;}
  .ask li{position:relative;padding-left:18px;font-size:14px;color:#6a5410;line-height:1.5;}
  .ask li::before{content:'';position:absolute;left:4px;top:9px;width:6px;height:6px;border-radius:50%;background:var(--pastel-yellow-dark);}

  details.example{border:1px dashed #Bcd6ee;background:#F4FAFF;border-radius:var(--r-md);padding:0 14px;margin-bottom:18px;}
  details.example summary{cursor:pointer;list-style:none;padding:12px 0;font-weight:700;color:var(--pastel-blue-dark);
    font-size:14px;display:flex;align-items:center;gap:7px;}
  details.example summary::-webkit-details-marker{display:none;}
  details.example .ex-body{padding:0 0 14px;font-size:14px;color:var(--gray-700);line-height:1.7;}
  details.example .ex-body b{color:var(--ink);}

  .field{margin-bottom:16px;}
  .field > label{display:block;font-weight:700;color:var(--ink);font-size:15px;margin-bottom:7px;}
  .field .hint{font-weight:500;color:var(--ink-mute);font-size:12px;margin-left:4px;}
  .input,.textarea{width:100%;padding:11px 14px;border:1.5px solid var(--gray-300);border-radius:var(--r-md);
    font-size:16px;color:var(--gray-900);background:var(--white);outline:none;transition:.15s;resize:vertical;line-height:1.6;}
  .textarea{min-height:74px;}
  .input:focus,.textarea:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(0,109,210,.16);}
  .input::placeholder,.textarea::placeholder{color:var(--ink-mute);}
  .grid2{display:grid;grid-template-columns:1fr;gap:16px;}
  @media(min-width:560px){.grid2{grid-template-columns:1fr 1fr;}}

  /* analysis row card */
  .rowcard{border:1.5px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:16px;background:var(--paper);position:relative;}
  .rowcard .rc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .rowcard .rc-title{display:inline-flex;align-items:center;gap:7px;font-weight:800;color:var(--pastel-blue-dark);font-size:15px;}
  .rowcard .rc-num{width:24px;height:24px;border-radius:50%;background:var(--pastel-blue);color:var(--pastel-blue-dark);
    display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;}
  .algo-card{display:grid;grid-template-columns:1fr;gap:24px;margin-top:6px;}
  .algo-step{position:relative;border:1.5px solid var(--border);background:var(--white);border-radius:var(--r-md);padding:12px;}
  .algo-step:not(:last-child)::after{content:"↓";display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;
    background:var(--color-primary);color:#fff;font-weight:900;position:absolute;left:50%;bottom:-21px;transform:translateX(-50%);z-index:1;box-shadow:var(--shadow-sm);}
  .algo-step label{display:flex;align-items:center;gap:7px;font-weight:800;color:var(--ink);font-size:14px;margin-bottom:8px;}
  .algo-badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:var(--color-primary-light);}
  .algo-badge .material-icons-outlined{font-size:18px;color:var(--color-primary);}
  .algo-hint{display:block;color:var(--ink-mute);font-size:12px;font-weight:600;margin-top:6px;line-height:1.4;}
  .algo-sentence{margin-top:14px;border-radius:var(--r-md);background:var(--color-primary-light);border:1px solid #CFE5FB;padding:12px 14px;color:var(--ink);line-height:1.8;font-size:14px;font-weight:600;}
  .algo-sentence b{color:var(--color-primary);}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--gray-500);display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;padding:0;border-radius:10px;}
  .icon-btn:hover{background:var(--gray-100);color:var(--color-primary);}
  .icon-btn.danger:hover{color:var(--pastel-pink-dark);background:#FFF0F3;}
  .step-num-tag{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;
    background:var(--pastel-blue);color:var(--pastel-blue-dark);font-size:12px;font-weight:800;margin-right:6px;}
  .addrow{display:inline-flex;align-items:center;gap:6px;background:var(--color-primary-light);color:var(--color-primary);
    border:1.5px dashed #9fc8ee;border-radius:var(--r-md);padding:11px 16px;font-weight:700;font-size:14px;cursor:pointer;width:100%;justify-content:center;}
  .addrow:hover{background:#dcecfb;}

  /* live sentence preview */
  .sentence-box{background:var(--color-primary-light);border:1px solid #CFE5FB;border-radius:var(--r-md);padding:14px 16px;margin-top:6px;}
  .sentence-box .sb-h{font-size:12px;font-weight:700;color:var(--color-primary);margin-bottom:8px;letter-spacing:.02em;}
  .sentence-box p{font-size:15px;color:var(--ink);line-height:1.9;}
  .sentence-box .blank{color:var(--color-primary);font-weight:800;}

  /* buttons / nav */
  .navbar{display:flex;gap:10px;margin-top:26px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 18px;border-radius:var(--r-md);
    font-size:15px;font-weight:700;cursor:pointer;border:none;transition:.18s;white-space:nowrap;}
  .btn .material-icons-outlined{font-size:18px;}
  .btn-export .material-icons-outlined{font-size:16px;}
  .btn-primary{background:var(--color-primary);color:#fff;box-shadow:var(--shadow-sm);}
  .btn-primary:hover{background:var(--color-primary-dark);}
  .btn-ghost{background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-300);}
  .btn-ghost:hover{background:#e9edf3;}
  .btn-green{background:var(--pastel-green-dark);color:#fff;}
  .btn-green:hover{filter:brightness(.94);}
  .btn-pink{background:var(--pastel-pink-dark);color:#fff;}
  .btn-pink:hover{filter:brightness(.94);}
  .btn-blue{background:var(--pastel-blue-dark);color:#fff;}
  .btn-blue:hover{filter:brightness(.94);}
  .btn-yellow{background:var(--pastel-yellow);color:var(--pastel-yellow-dark);border:1px solid #E9D47B;}
  .btn-yellow:hover{background:#F8E99A;}
  .btn-danger{background:#FFF0F3;color:var(--pastel-pink-dark);border:1px solid #F3B9C8;}
  .btn-danger:hover{background:#FFE2E9;}
  .btn:focus-visible{outline:3px solid rgba(0,109,210,.4);outline-offset:2px;}
  .grow{flex:1;}
  .export-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:18px;}
  @media(min-width:680px){.export-grid{grid-template-columns:repeat(4,1fr);}}
  .help-note{margin-top:12px;padding:12px 14px;border-radius:var(--r-md);background:var(--color-primary-light);color:var(--ink);font-size:14px;line-height:1.6;}
  .reset-row{display:flex;justify-content:center;margin-top:18px;}
  @media(max-width:559px){header.appbar{padding:10px 12px}.appbar-row{align-items:flex-start;gap:10px}.brand-txt p{display:none}.appbar-actions{gap:4px}.save-state{font-size:11px;padding:5px 8px}.icon-btn{width:34px;height:34px}.backup-menu{top:40px}.btn{width:100%;}.navbar{flex-wrap:wrap}.step-dot span{font-size:10px}.algo-step{padding:11px}.algo-sentence{font-size:13px}}

  /* result */
  .result-card{border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;background:var(--white);}
  .result-head{background:linear-gradient(135deg,#BFD9F2,#A6CDEA);padding:18px 20px;color:#15506F;}
  .result-head h3{font-size:19px;font-weight:800;}
  .result-head .meta{font-size:13px;margin-top:6px;display:flex;flex-wrap:wrap;gap:4px 18px;}
  .result-head .meta span{display:inline-flex;align-items:center;gap:4px;}
  .result-head .meta .material-icons-outlined{font-size:16px;}
  .result-head .meta .v,.result-head .meta .empty{color:#15506F;}
  .result-body{padding:18px 20px;}
  .rsec{margin-bottom:18px;}
  .rsec:last-child{margin-bottom:0;}
  .rsec h4{display:inline-flex;align-items:center;gap:7px;font-size:15px;font-weight:800;color:var(--ink);margin-bottom:9px;}
  .rsec .tag{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;}
  .kv{display:flex;gap:8px;font-size:14px;line-height:1.6;margin:3px 0;color:var(--gray-700);}
  .kv b{color:var(--ink);min-width:96px;flex-shrink:0;}
  .kv .v{color:var(--gray-700);}
  .mini-analysis{border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;margin:8px 0;background:var(--paper);}
  .mini-analysis .ma-t{font-weight:800;color:var(--pastel-blue-dark);font-size:13px;margin-bottom:6px;}
  .summ{background:var(--color-primary-light);border:1px solid #CFE5FB;border-radius:var(--r-md);padding:12px 14px;margin-top:8px;}
  .summ p{font-size:14px;color:var(--ink);line-height:1.9;font-weight:600;}
  .summ p b{color:var(--color-primary);}
  .empty{color:var(--ink-mute);font-style:italic;}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
    padding:12px 20px;border-radius:var(--r-pill);font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:60;box-shadow:var(--shadow-md);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  footer.chichiboo-footer{width:100%;padding:16px 24px;background:var(--gray-100);border-top:1px solid var(--gray-300);text-align:center;margin-top:24px;}
  .chichiboo-footer a{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--gray-500);text-decoration:none;transition:color .2s;}
  .chichiboo-footer a:hover{color:var(--color-primary);}
  .chichiboo-footer .material-icons-outlined{font-size:16px;}
</style>
</head>
<body>
<header class="appbar">
  <div class="appbar-row">
    <div class="brand-badge"><span class="material-icons-outlined">travel_explore</span></div>
    <div class="brand-txt">
      <h1>앱 연구소</h1>
      <p>App study · 화면 → 행동 → 반응 → 결과</p>
    </div>
    <div class="appbar-actions" aria-label="저장과 초기화">
      <span class="save-state" id="saveState" role="status" aria-live="polite">자동 저장 준비</span>
      <button class="icon-btn" id="backupMenuBtn" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="backupMenu" aria-label="백업/복원 메뉴 열기" title="백업/복원"><span class="material-icons-outlined" aria-hidden="true">save</span></button>
      <button class="icon-btn danger" id="clearAllBtn" type="button" aria-label="내용 전체 초기화" title="내용 전체 초기화"><span class="material-icons-outlined" aria-hidden="true">delete_sweep</span></button>
      <div class="backup-menu" id="backupMenu" role="menu" aria-label="백업과 복원">
        <button type="button" id="backupJsonBtn" role="menuitem"><span class="material-icons-outlined" aria-hidden="true">download</span>JSON 백업</button>
        <button type="button" id="restoreJsonBtn" role="menuitem"><span class="material-icons-outlined" aria-hidden="true">upload_file</span>JSON 복원</button>
      </div>
      <input id="restoreJsonInput" type="file" accept="application/json,.json" hidden />
    </div>
  </div>
  <nav class="stepper" id="stepper" aria-label="진행 단계"></nav>
</header>

<main><div class="stage" id="stage" aria-live="polite"></div></main>

<footer class="chichiboo-footer">
  <a href="mailto:chichiboo@kakao.com">
    <span class="material-icons-outlined">auto_stories</span>
    Created by. 교육뮤지컬 꿈꾸는 치수쌤
  </a>
</footer>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ---------------- state ---------------- */
var STEPS = ["시작", "활동 1", "활동 2", "활동 3", "결과·공유"];
var data = {
  appName:"", group:"",
  story:{ who:"", situation:"", before:"", during:"", after:"" },
  rows:[ {screen:"", action:"", reaction:"", result:""} ],
  review:{ good:"", weak:"", improve:"" }
};
var current = 0;
var CURRENT_KEY = "chichiboo_app_analysis_step_v1";
var SAVE_KEY = "chichiboo_app_analysis_v1";

function updateSaveState(msg){ var el=document.getElementById("saveState"); if(el) el.textContent=msg||"자동 저장됨"; }
function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(data)); localStorage.setItem(CURRENT_KEY, String(current)); updateSaveState("자동 저장됨"); }catch(e){ updateSaveState("저장 공간 확인 필요"); } }
function load(){ try{ var s=localStorage.getItem(SAVE_KEY); if(s){ var d=JSON.parse(s); if(d&&d.story&&d.rows&&d.review){ data=d; } } var c=parseInt(localStorage.getItem(CURRENT_KEY),10); if(!isNaN(c)&&c>=0&&c<STEPS.length){ current=c; } }catch(e){} }
function emptyData(){ return { appName:"", group:"", story:{who:"",situation:"",before:"",during:"",after:""}, rows:[{screen:"",action:"",reaction:"",result:""}], review:{good:"",weak:"",improve:""} }; }
function clearAll(){
  if(confirm("작성한 내용을 모두 지울까요? 새로고침해도 복구되지 않아요.")){
    data=emptyData(); current=0; save(); showStep(); toast("내용을 모두 지웠어요.");
  }
}

function backupPayload(){
  return { app:"App study", version:2, exportedAt:new Date().toISOString(), current:current, data:data };
}
function exportJSON(){
  downloadBlob(new Blob([JSON.stringify(backupPayload(), null, 2)], {type:"application/json;charset=utf-8"}), fileBase()+"_backup.json");
  closeBackupMenu();
  toast("JSON 백업 파일을 저장했어요!");
}
function normalizeRestorePayload(obj){
  if(obj && obj.data && obj.data.story && obj.data.rows && obj.data.review){ return {data:obj.data, current:obj.current}; }
  if(obj && obj.story && obj.rows && obj.review){ return {data:obj, current:0}; }
  return null;
}
function restoreJSONFile(file){
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(){
    try{
      var restored=normalizeRestorePayload(JSON.parse(String(reader.result||"")));
      if(!restored){ toast("복원할 수 없는 JSON 파일이에요."); return; }
      if(!confirm("현재 작성 내용을 JSON 파일 내용으로 바꿀까요?")){ return; }
      data=restored.data;
      var next=parseInt(restored.current,10);
      current=(!isNaN(next)&&next>=0&&next<STEPS.length)? next : 0;
      save(); showStep(); toast("JSON 파일에서 복원했어요!");
    }catch(e){ toast("JSON 파일을 읽을 수 없어요."); }
  };
  reader.readAsText(file, "utf-8");
}
function setBackupMenuOpen(open){
  var m=document.getElementById("backupMenu"), b=document.getElementById("backupMenuBtn");
  if(m) m.classList.toggle("open", !!open);
  if(b) b.setAttribute("aria-expanded", open ? "true" : "false");
}
function openBackupMenu(){ var m=document.getElementById("backupMenu"); setBackupMenuOpen(!(m&&m.classList.contains("open"))); }
function closeBackupMenu(){ setBackupMenuOpen(false); }
function bindBackupMenu(){
  var menuBtn=document.getElementById("backupMenuBtn"), backupBtn=document.getElementById("backupJsonBtn"), restoreBtn=document.getElementById("restoreJsonBtn"), input=document.getElementById("restoreJsonInput");
  if(menuBtn){ menuBtn.addEventListener("click", function(e){ e.stopPropagation(); openBackupMenu(); }); }
  if(backupBtn){ backupBtn.addEventListener("click", exportJSON); }
  if(restoreBtn && input){ restoreBtn.addEventListener("click", function(){ closeBackupMenu(); input.click(); }); }
  if(input){ input.addEventListener("change", function(){ restoreJSONFile(input.files && input.files[0]); input.value=""; }); }
  document.addEventListener("click", function(e){ var menu=document.getElementById("backupMenu"); if(menu && !menu.contains(e.target) && e.target!==menuBtn){ closeBackupMenu(); } });
  document.addEventListener("keydown", function(e){ if(e.key==="Escape"){ closeBackupMenu(); } });
}

  });
  t.push("");

}

function downloadBlob(blob, filename){
  var url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },200);
}

function copyText(){

    navigator.clipboard.writeText(text).then(function(){ toast("텍스트를 복사했어요!"); }).catch(function(){ fallbackCopyText(text); });

}
function fallbackCopyText(text){
  var ta=document.createElement("textarea"); ta.value=text; ta.setAttribute("readonly",""); ta.style.position="fixed"; ta.style.left="-9999px";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("텍스트를 복사했어요!"); }catch(e){ toast("복사할 수 없어요. 저장을 사용해 주세요."); }
  document.body.removeChild(ta);
}

/* ---- JPG via Canvas (no external library) ---- */
var FONT='"Pretendard GOV", Pretendard, sans-serif';
var Cc={ ink:"#2A4D6E", inkSoft:"#5C7A95", inkMute:"#9BB1C4", border:"#E2E9F0", white:"#FFFFFF", cream:"#FFFEFB",
  pb:"#BFD9F2", pbd:"#1A5F8A", py:"#FFF3B0", pyd:"#7A6000", pg:"#C8EDD9", pgd:"#1A6B47", pp:"#FFD6E0", ppd:"#8A2840",
  primary:"#006DD2", primaryLight:"#E8F3FF", headTop:"#BFD9F2", headBot:"#A6CDEA" };

function wrapLines(ctx,text,font,maxW){
  ctx.font=font;
  var paras=String(text==null?"":text).split("\n"), out=[];
  for(var pi=0;pi<paras.length;pi++){
    var p=paras[pi];
    if(p===""){ out.push(""); continue; }
    var words=p.split(" "), cur="";
    for(var wi=0; wi<words.length; wi++){
      var w=words[wi], test=cur? cur+" "+w : w;
      if(ctx.measureText(test).width<=maxW){ cur=test; }
      else{
        if(cur){ out.push(cur); cur=""; }
        if(ctx.measureText(w).width>maxW){
          var c="";
          for(var ci=0; ci<w.length; ci++){
            var ch=w[ci];
            if(ctx.measureText(c+ch).width<=maxW){ c+=ch; }
            else{ if(c) out.push(c); c=ch; }
          }
          cur=c;
        } else { cur=w; }
      }
    }
    if(cur) out.push(cur);
  }
  return out;
}
function rr(ctx,x,y,w,h,r){
  if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); return; }
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function renderResultCanvas(ctx, drawing, W, totalH){
  var pad=44, x=pad, cw=W-pad*2, y=pad;
  var fTitle="800 38px "+FONT, fMeta="600 19px "+FONT, fSecH="800 24px "+FONT,
      fLabel="800 18px "+FONT, fBody="400 22px "+FONT, fSmall="600 17px "+FONT;
  var bodyLH=33, kvLH=31;

  function measureChunk(fn){ var sy=y, sd=drawing; drawing=false; fn(); var h=y-sy; y=sy; drawing=sd; return h; }

  if(drawing){ ctx.fillStyle=Cc.cream; ctx.fillRect(0,0,W,totalH); }

  /* header band */
  (function(){
    var hLines=[];
    ctx.font=fMeta;
    var metaParts=["분석한 앱 :  "+plain(data.appName,"( )"),"모둠·이름 :  "+plain(data.group,"( )"),"작성일 :  "+todayStr()];
    var metaWrapped=[];
    for(var i=0;i<metaParts.length;i++){ metaWrapped=metaWrapped.concat(wrapLines(ctx,metaParts[i],fMeta,cw-44)); }
    var hh=24+44+8+metaWrapped.length*27+24;
    if(drawing){
      var g=ctx.createLinearGradient(x,y,x+cw,y+hh);
      g.addColorStop(0,Cc.headTop); g.addColorStop(1,Cc.headBot);
      rr(ctx,x,y,cw,hh,18); ctx.fillStyle=g; ctx.fill();
      ctx.fillStyle="#15506F"; ctx.textBaseline="alphabetic"; ctx.textAlign="left";
      ctx.font=fTitle; ctx.fillText("앱 분석 탐구 결과물", x+24, y+24+30);
      ctx.font=fMeta; var my=y+24+44+8+18;
      for(var k=0;k<metaWrapped.length;k++){ ctx.fillText(metaWrapped[k], x+24, my); my+=27; }
    }
    y+=hh+22;
  })();

  /* flow pills */
  (function(){
    var items=["화면에 있는 것","사용자의 행동","앱의 반응","사용자의 결과"];
    var bg=["#E8F3FF","#BFD9F2","#A6CDEA","#006DD2"], fg=["#006DD2","#1A5F8A","#15506F","#FFFFFF"];
    var ph=42, font="700 18px "+FONT; ctx.font=font;
    var ws=items.map(function(t){ return Math.ceil(ctx.measureText(t).width)+30; });
    var arrowW=30, total=ws.reduce(function(a,b){return a+b;},0)+arrowW*3;
    var scale=1; if(total>cw){ scale=cw/total; }
    if(drawing){
      var px=x+(cw-total*scale)/2; ctx.textBaseline="middle";
      for(var i=0;i<4;i++){
        var pw=ws[i]*scale;
        rr(ctx,px,y,pw,ph,21); ctx.fillStyle=bg[i]; ctx.fill();
        ctx.fillStyle=fg[i]; ctx.font="700 "+Math.round(18*scale)+"px "+FONT; ctx.textAlign="center";
        ctx.fillText(items[i], px+pw/2, y+ph/2+1); px+=pw;
        if(i<3){ ctx.fillStyle=Cc.primary; ctx.font="800 22px "+FONT; ctx.fillText("→", px+arrowW*scale/2, y+ph/2); px+=arrowW*scale; }
      }
      ctx.textAlign="left"; ctx.textBaseline="alphabetic";
    }
    y+=ph+24;
  })();

  /* helper: section title */
  function secTitle(tag, tagBg, tagFg, title){
    var th=34;
    if(drawing){
      ctx.font="800 15px "+FONT; var tw=Math.ceil(ctx.measureText(tag).width)+22;
      rr(ctx,x,y,tw,26,13); ctx.fillStyle=tagBg; ctx.fill();
      ctx.fillStyle=tagFg; ctx.textBaseline="middle"; ctx.textAlign="left"; ctx.fillText(tag, x+11, y+14);
      ctx.fillStyle=Cc.ink; ctx.font=fSecH; ctx.textBaseline="alphabetic"; ctx.fillText(title, x+tw+12, y+22);
    }
    y+=th+8;
  }
  /* helper: key-value row (label bold + wrapped value) */
  function kv(label, value, ph){
    var labelW=200;
    var lines=wrapLines(ctx, plain(value,ph||"( )"), fBody, cw-labelW-40);
    var blockH=Math.max(kvLH, lines.length*kvLH);
    if(drawing){
      ctx.textBaseline="alphabetic"; ctx.textAlign="left";
      ctx.font=fLabel; ctx.fillStyle=Cc.inkSoft; ctx.fillText(label, x, y+22);
      ctx.font=fBody; ctx.fillStyle=(String(value||"").trim()? Cc.ink : Cc.inkMute);
      for(var i=0;i<lines.length;i++){ ctx.fillText(lines[i], x+labelW, y+22+i*kvLH); }
    }
    y+=blockH+2;
  }
  /* helper: inner mini-card for analysis */
  function kvAll(r){
    kv("① 화면에 있는 것", r.screen);
    kv("② 사용자의 행동", r.action);
    kv("③ 앱의 반응", r.reaction);
    kv("④ 사용자의 결과", r.result);
  }
  function miniCard(idx, r){
    var innerLeft=x+20, startY=y;
    var innerH=measureChunk(function(){
      y+=16+26;
      var sx=x; x=innerLeft; kvAll(r); x=sx;
      y+=12;
    });
    if(drawing){
      rr(ctx,x,startY,cw,innerH,14); ctx.fillStyle=Cc.white; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle=Cc.border; ctx.stroke();
      ctx.font="800 17px "+FONT; ctx.fillStyle=Cc.pbd; ctx.textBaseline="alphabetic"; ctx.textAlign="left";
      ctx.fillText("살펴본 화면 "+(idx+1), x+20, startY+16+19);
    }
    var sx=x; x=innerLeft;
    y=startY+16+26;
    kvAll(r);
    x=sx;
    y=startY+innerH+10;
  }

  /* Section 1 : story */
  secTitle("활동 1", Cc.primaryLight, Cc.primary, "앱을 사용한 어떤 사람 이야기");
  (function(){
    var sx=x; x=sx+4;
    kv("사용하는 사람", data.story.who);
    kv("어떤 상황", data.story.situation);
    kv("① 쓰기 전", data.story.before);
    kv("② 쓰는 중", data.story.during);
    kv("③ 쓴 뒤", data.story.after);
    x=sx; y+=14;
  })();

  /* Section 2 : analysis */
  secTitle("활동 2", Cc.primaryLight, Cc.primary, "알고리즘처럼 보는 앱 작동 분석");
  for(var ri=0; ri<data.rows.length; ri++){ miniCard(ri, data.rows[ri]); }
  y+=8;

  /* Section 3 : review summary */
  secTitle("활동 3", Cc.primaryLight, Cc.primary, "앱 연구원의 한마디");
  (function(){
    var rv=data.review;
    var s1="•  이 앱의 좋은 점은 "+plain(rv.good,"________")+" 입니다.";
    var s2="•  "+plain(rv.weak,"________")+" 부분은 조금 아쉽습니다.";
    var s3="•  "+plain(rv.improve,"________")+" 하면 더 좋은 앱이 될 것 같습니다.";
    var L1=wrapLines(ctx,s1,fBody,cw-40),L2=wrapLines(ctx,s2,fBody,cw-40),L3=wrapLines(ctx,s3,fBody,cw-40);
    var n=L1.length+L2.length+L3.length;
    var boxH=16+n*kvLH+ (2*8) +16;
    var startY=y;
    if(drawing){
      rr(ctx,x,startY,cw,boxH,14); ctx.fillStyle=Cc.primaryLight; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle="#CFE5FB"; ctx.stroke();
      ctx.font=fBody; ctx.fillStyle=Cc.ink; ctx.textBaseline="alphabetic"; ctx.textAlign="left";
      var yy=startY+16+20; var groups=[L1,L2,L3];
      for(var gi=0; gi<groups.length; gi++){
        for(var li=0; li<groups[gi].length; li++){ ctx.fillText(groups[gi][li], x+20, yy); yy+=kvLH; }
        yy+=8;
      }
    }
    y=startY+boxH+14;
  })();

  /* footer */
  (function(){
    if(drawing){
      ctx.textAlign="center"; ctx.textBaseline="alphabetic";
      ctx.font=fSmall; ctx.fillStyle=Cc.inkSoft;
      ctx.fillText("화면에 있는 것 → 사용자의 행동 → 앱의 반응 → 사용자의 결과", W/2, y+18);
      ctx.font="700 17px "+FONT; ctx.fillStyle=Cc.pbd;
      ctx.fillText("교육뮤지컬 꿈꾸는 치수쌤  |  chichiboo@kakao.com", W/2, y+18+28);
      ctx.textAlign="left";
    }
    y+=18+28+16;
  })();

  return y;
}

function makeResultCanvas(){
  var W=960;
  var meas=document.createElement("canvas"); var mctx=meas.getContext("2d");
  var totalH=Math.ceil(renderResultCanvas(mctx,false,W,0));
  var dpr=2;
  var cv=document.createElement("canvas");
  cv.width=W*dpr; cv.height=totalH*dpr;
  var ctx=cv.getContext("2d");
  ctx.scale(dpr,dpr);
  renderResultCanvas(ctx,true,W,totalH);
  return cv;
}
function withResultCanvas(fn){
  var go=function(){ fn(makeResultCanvas()); };
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(go).catch(go); } else { go(); }
}
function exportJPG(){
  withResultCanvas(function(cv){
    cv.toBlob(function(blob){
      if(!blob){ toast("저장에 실패했어요. 다시 시도해 주세요."); return; }
      downloadBlob(blob, fileBase()+".jpg");
      toast("JPG 이미지를 저장했어요!");
    }, "image/jpeg", 0.95);
  });
}
function copyImage(){
  if(!(navigator.clipboard && window.ClipboardItem)){ toast("이미지 복사를 지원하지 않아 이미지 저장을 사용해 주세요."); return; }
  withResultCanvas(function(cv){
    cv.toBlob(function(blob){
      if(!blob){ toast("이미지 만들기에 실패했어요."); return; }
      navigator.clipboard.write([new ClipboardItem({"image/png": blob})]).then(function(){ toast("이미지를 복사했어요!"); }).catch(function(){ toast("이미지 복사가 막혔어요. 이미지 저장을 사용해 주세요."); });
    }, "image/png");
  });
}

/* ---------------- bindings per step ---------------- */
function bindStart(){
  bindInput("appName", function(v){ data.appName=v; });
  bindInput("group", function(v){ data.group=v; });
}
function bindStory(){
  ["who","situation","before","during","after"].forEach(function(id){
    bindInput(id, function(v){ data.story[id]=v; });
  });
}
function bindAnalysis(){
  var rowsEl=document.getElementById("rows");
  Array.prototype.forEach.call(rowsEl.querySelectorAll(".rowcard"), function(rc){
    var idx=parseInt(rc.dataset.row,10);
    Array.prototype.forEach.call(rc.querySelectorAll("input[data-f]"), function(inp){
      inp.addEventListener("input", function(){ data.rows[idx][inp.dataset.f]=inp.value; var pv=rc.querySelector("[data-preview]"); if(pv){ pv.innerHTML=algoSentence(data.rows[idx]); } save(); });
    });
    var del=rc.querySelector("[data-del]");
    if(del){ del.addEventListener("click", function(){ data.rows.splice(idx,1); save(); showStep(); }); }
  });
  var add=document.getElementById("addRow");
  if(add){ add.addEventListener("click", function(){ if(data.rows.length<4){ data.rows.push({screen:"",action:"",reaction:"",result:""}); save(); showStep(); } }); }
}
function bindReview(){
  ["good","weak","improve"].forEach(function(id){
    bindInput(id, function(v){
      data.review[id]=v;
      var pv=document.getElementById("pv-"+id);
      if(pv){ pv.textContent = v.trim()? v.trim() : "_______"; }
    });
  });
}
function bindResult(){
  var ct=document.getElementById("copyTxtBtn"); if(ct) ct.addEventListener("click", copyText);
  var ci=document.getElementById("copyImgBtn"); if(ci) ci.addEventListener("click", copyImage);
  var t=document.getElementById("txtBtn"); if(t) t.addEventListener("click", exportTXT);
  var j=document.getElementById("jpgBtn"); if(j) j.addEventListener("click", exportJPG);
  var r=document.getElementById("resetBtn"); if(r) r.addEventListener("click", clearAll);
}
function bindInput(id, setter){
  var el=document.getElementById(id);
  if(!el) return;
  el.addEventListener("input", function(){ setter(el.value); save(); });
}

/* ---------------- controller ---------------- */
function showStep(){
  var stage=document.getElementById("stage");
  var views=[viewStart,viewStory,viewAnalysis,viewReview,viewResult];
  stage.innerHTML=views[current]();
  renderStepper();
  var prev=document.getElementById("prevBtn"); if(prev) prev.addEventListener("click", function(){ goTo(current-1); });
  var next=document.getElementById("nextBtn"); if(next) next.addEventListener("click", function(){ goTo(current+1); });
  [bindStart,bindStory,bindAnalysis,bindReview,bindResult][current]();
  window.scrollTo({top:0,behavior:"smooth"});
}
function goTo(i){ if(i<0||i>=STEPS.length) return; current=i; save(); showStep(); }

var toastTimer=null;
function toast(msg){
  var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(function(){ t.classList.remove("show"); },2200);
}

load();
showStep();
var clearBtn=document.getElementById("clearAllBtn"); if(clearBtn) clearBtn.addEventListener("click", clearAll);
bindBackupMenu();
updateSaveState("자동 저장 켜짐");
</script>
